<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <header>

    </header>
    <main>
        <article id="ascend">
            <button id="ascend_tier2" value="2">Tier II — Apprentice</button>
            <button id="ascend_tier3" value="3">Tier III — Journeyman</button>
            <button id="ascend_tier4" value="4">Tier IV — Expert</button>
            <button id="ascend_tier5" value="5">Tier V — Master</button>
            <div class="ascend_bonuses">
                <p>Select one to continue</p>
                <button id="keep_crit">Keep crit, but reset and half others</button>
                <button id="keep_click_power">Keep click power, but reset and half others</button>
                <button id="keep_afk">Keep afk, but reset and half others</button>
            </div>
        </article>
        <article id="main_game">
            <section class="not_srolable">
                <div class="upper_btn_event">
                    <button id="ascend_btn">Ascension: </button>
                    <p id="curr_event">Event: None</p>
                </div>
                <h1 id="score">0</h1>
                <div class="clicker_place">
                    <img oncontextmenu="return false" id="click" src="https://res.cloudinary.com/teepublic/image/private/s--Mncu2r6i--/t_Preview/b_rgb:000000,c_lpad,f_jpg,h_630,q_90,w_1200/v1750944117/production/designs/76787070_0.jpg" alt="Moneta">
                    <div class="mini_game">
                        <progress id="fish_hp" value="100" max="100"></progress>
                        <img id="man" src="imgs/3.png">
                    </div>
                </div>
            </section>
            <section class="upgrades">
                <h1>UPGRADES</h1>
                <div id="cards">

                </div>
            </section>
        </article>
    </main>
    <footer>
        <p></p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
